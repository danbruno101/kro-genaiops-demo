name: publish-images

# Publishes the demo's mock images to GHCR so they can be pulled by REAL clusters
# (GKE / AKS) during the live demo. On kind (CI + local dev) the images are built
# and `kind load`-ed locally, so this workflow is NOT a dependency of the
# demo-smoke-test CI — it only matters for the real-cloud path.
#
# One-time after the first successful run: set the three packages to PUBLIC
#   https://github.com/users/danbruno101/packages  (each package -> Settings ->
#   Change visibility -> Public)  so managed clusters can pull without a secret.

on:
  push:
    branches: [main]
    paths:
      - "monitoring/mock-vllm/**"
      - "monitoring/mock-trainer/**"
      - "monitoring/mock-drift/**"
      - ".github/workflows/publish-images.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: mock-vllm
            context: monitoring/mock-vllm
          - name: mock-trainer
            context: monitoring/mock-trainer
          - name: mock-drift
            context: monitoring/mock-drift
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/danbruno101/${{ matrix.image.name }}:demo
