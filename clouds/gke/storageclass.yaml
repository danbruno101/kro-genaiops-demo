# =============================================================================
# GKE environment config (platform-team owned).
# -----------------------------------------------------------------------------
# Makes a cluster behave like GKE for the demo: the default StorageClass is
# named `premium-rwo` -- exactly what GKE calls its SSD-backed default class.
# A product instance that leaves `storageClass` empty inherits THIS, so its
# PVC binds to `premium-rwo` without the product team ever naming it.
#
# SIMULATION NOTE: provisioner is kind's built-in `rancher.io/local-path` so the
# demo runs cloud-free on a laptop. On a real GKE cluster this same object uses
# provisioner `pd.csi.storage.gke.io` with `type: pd-ssd`; nothing else changes.
# =============================================================================
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: premium-rwo
  labels:
    demo.genaiops/cloud: gke
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: rancher.io/local-path
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
