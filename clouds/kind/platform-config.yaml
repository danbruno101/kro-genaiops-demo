# =============================================================================
# kind (laptop) platform config (platform-team owned). KRO reads this.
# -----------------------------------------------------------------------------
# The base single-cluster demo (scripts/setup.sh) is a kind cluster. The
# GenAIOps RGD requires the genaiops-platform-config ConfigMap to exist before
# any GenAIService reconciles, so we ship one here too.
#
# storageClass is intentionally EMPTY: on a laptop we want to inherit whatever
# the cluster's default StorageClass is (kind ships `standard`). Empty is the
# bottom of the resolution chain -- KRO omits storageClassName and Kubernetes
# uses the default class. Set a value here only if a kind cluster has a
# non-default class you want GenAI workloads pinned to.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: genaiops-platform-config
  labels:
    demo.genaiops/cloud: kind
data:
  storageClass: ""
