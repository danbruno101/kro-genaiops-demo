# =============================================================================
# EKS platform config (platform-team owned). KRO reads this.
# -----------------------------------------------------------------------------
# Worked example for "adding a cloud": the GenAIOps RGD references this
# ConfigMap as a read-only externalRef and folds `storageClass` into every
# GenAIService's PVC. On an "EKS" cluster that value is `gp3`.
#
# Pairs with clouds/eks/storageclass.yaml. setup-multicloud.sh only spins up the
# GKE and AKS clusters; point it at this folder to make EKS live -- the RGD and
# every instance stay untouched.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: genaiops-platform-config
  labels:
    demo.genaiops/cloud: eks
data:
  storageClass: gp3
