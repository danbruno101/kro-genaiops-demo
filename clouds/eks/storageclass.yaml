# =============================================================================
# EKS environment config (platform-team owned).
# -----------------------------------------------------------------------------
# Worked example of "adding a cloud": this folder exists, but
# setup-multicloud.sh only spins up the GKE and AKS clusters. To make a third
# simulated cloud live, point the script at this file -- the RGD and every
# product instance stay untouched.
#
# The default StorageClass is named `gp3` -- what EKS calls its general-purpose
# gp3-backed class.
#
# SIMULATION NOTE: provisioner is kind's built-in `rancher.io/local-path` so the
# demo runs cloud-free on a laptop. On a real EKS cluster this same object uses
# provisioner `ebs.csi.aws.com` with `type: gp3`; nothing else changes.
# =============================================================================
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  labels:
    demo.genaiops/cloud: eks
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: rancher.io/local-path
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete
